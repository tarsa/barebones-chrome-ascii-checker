<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Printable ASCII Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="card">
    <h1>Printable ASCII Checker</h1>
    <p class="hint">Checks whether every character is a tab, newline, space, or printable ASCII character.</p>
    <label for="inputText">Text to check</label>
    <textarea id="inputText" rows="8" placeholder="Paste or type text here"></textarea>
    <p id="result" class="result" aria-live="polite"></p>
    <div id="context" class="context" hidden></div>
</main>
<script src="popup.js"></script>
</body>
</html>
